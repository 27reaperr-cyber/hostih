version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  MC Hosting — docker-compose
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-mc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mc_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-mc_hosting}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mc_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mc_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: python api.py
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-mc_user}:${POSTGRES_PASSWORD:-mc_pass}@postgres:5432/${POSTGRES_DB:-mc_hosting}
      API_SECRET_TOKEN:  ${API_SECRET_TOKEN:-change_me_please}
      DOCKER_NETWORK:    ${DOCKER_NETWORK:-minecraft_net}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    networks:
      - mc_backend
    healthcheck:
      # wget встроен в python:slim — curl там нет
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  bot:
    build: .
    command: python bot.py
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      BOT_TOKEN:         ${BOT_TOKEN}
      API_BASE_URL:      http://api:8000
      API_SECRET_TOKEN:  ${API_SECRET_TOKEN:-change_me_please}
    networks:
      - mc_backend

volumes:
  postgres_data:

networks:
  # name: явно задаём, иначе Compose добавит префикс папки → hostname не найдётся
  mc_backend:
    name: mc_backend
    driver: bridge
